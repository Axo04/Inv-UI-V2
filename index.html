<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory UI</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

background:  conic-gradient(#3c0e62, #4a082a, #3c0e62);
    color: white;
    font-family: Arial;
}

/* panel */
.panel {
    width: 1352px;
    height: 490px;
    background: #1a1a24;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    gap: 20px;
}

/* items */
.items {
  display: grid !important;
  grid-template-columns: repeat(4, 70px) !important;
  gap: 12px;

  align-content: start !important; /* 🔥 KEY FIX */
}

.item {
  width: 70px;
  height: 70px;

  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;

  display: flex;
  align-items: center;
  justify-content: center;
}
    


.item img {
    width: 80%;
    height: 80%;
}

/* info panel */
.info-panel {
    flex: 1;
    background: #14141c;
    border-radius: 15px;
    padding: 15px;
    height: 450px;

    position: relative; /* ← THIS IS THE FIX */
}

.info-panel p {
    display: flex;
    align-items: center;
    gap: 8px;
}

#itemIcon {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 60px;
  
}


#particleContainer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  opacity: 0.8;
  animation: floatUp 1.2s ease-out forwards;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-80px) scale(0.5);
    opacity: 0;
  }
}

.item.selected {
    border: 2px solid;
}

/* icons */
.stat-icon {
    width: 50px;
    height: 50px;
}

/* labels */
.label {
    color: #aaa;
}

/* name */
#name {
    font-size: 22px;
    font-weight: bold;
    padding-right: 90px !important;
}

/* enchant box */
.enchant-box {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.enchant-box select {
    background: #2a2a3a;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 6px;
}

.enchant-box button {
    background: #3a3a55;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* enchant display */
#enchantDisplay {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

#enchantIcon {
    width: 50px;
    height: 50px;
}
#enchantDescBox {
    display: flex;
    align-items: center;
    gap: 8px;
}
#enchantDesc {
    opacity: 0.8;
    text-align: center;
}

#enchantTitle {
    font-weight: bold;

}
.enchant-box {
    margin-top: 15px;
    display: flex;
    justify-content: center; /* 👈 centers it */
    gap: 10px;
}
.weaponmaker-slot{
    cursor:pointer;
    transition:.2s;
}

.weaponmaker-slot:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00d9ff;
}

.weaponmaker-slot{
    position:relative;
}

.corner-badge{
    position:absolute;
    top:6px;
    right:6px;

    width:18px;
    height:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:11px;
    border-radius:50%;

    background:#111;
    color:#00eaff;

    box-shadow:
        0 0 6px #00eaff,
        0 0 12px #00eaff;

    opacity:1;          /* always visible */
    visibility:visible; /* always visible */
    z-index:5;
}

.portal-panel{
    margin-top:24px;
    padding:18px;
    border-radius:18px;
    background:rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.08);
}

.portal-panel h3{
    margin:0 0 14px;
    color:#fff;
    text-shadow:0 0 10px #ff00ea;
}

.portal-grid{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.portal-card{
    min-width:97px;
    padding:14px;
    border-radius:14px;
    background:#252536;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:.2s;
}

.portal-card:hover{
    transform:translateY(-2px);
    box-shadow:0 0 14px #00eaff;
}

.portal-card img{
    width:34px;
    height:34px;
    object-fit:contain;
}

.portal-icon{
    font-size:28px;
}

.portal-card span:last-child{
    font-weight:bold;
}
</style>
</head>
