<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory UI - Weapon Maker</title>
<link rel="icon" type="image/png" href="wmfavicon.png">

<style>
*{box-sizing:border-box}
body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    color:white;
    background:conic-gradient(#3c0e62,#4a082a,#3c0e62);
}
.panel{
    position:relative;
    width:950px;
    max-width:95vw;
    background:#1a1a24;
    border-radius:24px;
    padding:24px;
    box-shadow:0 0 30px rgba(0,0,0,.45);
}
.maker{
    position:relative;
    width:430px;
    max-width:100%;
    background:#14141c;
    border-radius:18px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}
h2{
    margin:0;
    text-align:center;
    text-shadow:0 0 10px #b84dff;
}
input,select,button,textarea{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a3a;
    color:white;
    font-size:15px;
}
button{
    cursor:pointer;
    transition:.2s;
}
button:hover{
    transform:translateY(-1px);
    box-shadow:0 0 12px #9b97c0;
}
textarea{
    min-height:110px;
    resize:none;
    background:#0f0f14;
    color:#8aff9d;
    font-family:monospace;
}
#makerPreview{
    position:relative;
    min-height:230px;
    background:#0f0f14;
    border-radius:14px;
    padding:18px;
    text-align:center;
    overflow:hidden;
}
#makerPreview img{
    width:70px;
    height:70px;
    object-fit:contain;
    position:relative;
    z-index:2;
}
#makerPreview h3,
#makerPreview p{
    position:relative;
    z-index:2;
}
#particles{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}
.particle{
    position:absolute;
    pointer-events:none;
    user-select:none;
}
#selectedIconDisplay{
    text-align:center;
    color:#ccc;
    min-height:24px;
}
.controls{
    position:absolute;
    left:calc(100% + 30px);
    top:50%;
    transform:translateY(-50%);
    width:220px;
    background:#14141c;
    border-radius:16px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    box-shadow:0 0 25px rgba(0,0,0,.4);
}
#copyBtn:hover{
    box-shadow:0 0 8px #ff0000,0 0 16px #ff8800;
}
#hubBtn:hover{
    box-shadow:0 0 8px #3aa0ff,0 0 16px #ff1493;
}
#iconBackdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
}
#iconPicker{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:520px;
    max-width:90vw;
    max-height:75vh;
    overflow:auto;
    background:#14141c;
    border:2px solid #5a5a84;
    border-radius:16px;
    padding:20px;
    display:none;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:14px;
    z-index:10;
    scrollbar-width:none;
}
#iconPicker::-webkit-scrollbar{display:none}
.icon-option{
    background:#2a2a3a;
    border-radius:12px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
}
.icon-option:hover{
    transform:scale(1.05);
    box-shadow:0 0 12px #9b97c0;
}
.icon-option img{
    width:52px;
    height:52px;
    object-fit:contain;
}
.icon-option p{
    margin:8px 0 0;
    font-size:12px;
    color:#ddd;
}
@media (max-width:760px){
    .controls{
        position:static;
        transform:none;
        width:100%;
        margin-top:8px;
    }
}
</style>
</head>
<body>

<div class="panel">
    <div class="maker">
        <h2>Make Your Custom Weapon</h2>

        <div id="makerPreview">
            <div id="particles"></div>
            <img id="makerPreviewIcon" src="custom.png">
            <h3 id="makerPreviewName">Preview</h3>
            <p>Damage: <span id="makerPreviewDamage"></span></p>
            <p>Rarity: <span id="makerPreviewRarity"></span></p>
            <p>Max LVL: <span id="makerPreviewPower"></span></p>
        </div>

        <input id="makerName" placeholder="Weapon name">
        <input id="makerDamage" type="number" placeholder="Damage">

        <select id="makerRarity">
            <option>Common</option>
            <option>Rare</option>
            <option>Epic</option>
            <option>Unique</option>
            <option>Electric</option>
            <option>Magma</option>
            <option>Terror</option>
            <option>Void</option>
            <option>Void+</option>
        </select>

        <input id="makerPower" type="number" placeholder="Power">

        <button onclick="openIconPicker()">Select Icon</button>
        <div id="selectedIconDisplay">No icon selected</div>

        <button onclick="previewWeapon()">Preview</button>
        <button onclick="generateCode()">Generate Code</button>

        <textarea id="codeOutput" readonly placeholder="generated code appears here"></textarea>

        <div class="controls">
            <button onclick="resetMaker()">Reset</button>
            <button onclick="copyCode()" id="copyBtn">Copy Code</button>
            <button onclick="location.href='websitehub.html'" id="hubBtn">Back to Hub</button>
        </div>
    </div>
</div>

<div id="iconBackdrop" onclick="closeIconPicker()"></div>
<div id="iconPicker"></div>
<input type="file" id="customUpload" accept="image/*" hidden>

<script>
const weapons = [
  { id:"axe.png", name:"Axe" },
  { id:"bow.png", name:"Bow" },
  { id:"dagger.png", name:"Daggers" },
  { id:"staff.png", name:"Staff" },
  { id:"flame.png", name:"Flame Sword" },
  { id:"cursedaxe.png", name:"Cursed Axe" },
  { id:"fof.png", name:"Fangs of Frost" },
  { id:"obsitian claymore.png", name:"Obsidian Claymore" },
  { id:"electrichammer.png", name:"Electric Hammer" },
  { id:"__custom__", name:"Custom", icon:"custom.png" }
];

let currentIconValue = "";
let previewIconURL = "";

const rarityColors = {
  common:"#aaa",
  rare:"#3aa0ff",
  epic:"#a335ee",
  unique:"#ff9a00",
  electric:"#6ef0ff",
  magma:"#ff6600",
  terror:"#9900D1",
  void:"#FF00E2",
  "void+":"#FF2E8F"
};

function openIconPicker(){
  iconBackdrop.style.display="block";
  iconPicker.style.display="grid";
}
function closeIconPicker(){
  iconBackdrop.style.display="none";
  iconPicker.style.display="none";
}
function selectIcon(src,name){
  currentIconValue = src;
  previewIconURL = "";
  selectedIconDisplay.textContent = name;
  closeIconPicker();
}

function loadWeapons(){
  iconPicker.innerHTML = "";
  weapons.forEach(weapon=>{
    const div = document.createElement("div");
    div.className = "icon-option";
    div.innerHTML = `<img src="${weapon.icon || weapon.id}"><p>${weapon.name}</p>`;
    div.onclick = ()=>{
      if(weapon.id === "__custom__"){
        customUpload.click();
      } else {
        selectIcon(weapon.id, weapon.name);
      }
    };
    iconPicker.appendChild(div);
  });
}

customUpload.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  currentIconValue = file.name;
  previewIconURL = URL.createObjectURL(file);

  selectedIconDisplay.textContent = file.name;
  closeIconPicker();
});

function clearParticles(){
  particles.innerHTML = "";
}

function spawnElectric(){
  const img = document.createElement("img");
  img.src = "electricparticle.png";
  img.className = "particle";
  img.style.left = Math.random()*85 + "%";
  img.style.top = Math.random()*75 + "%";
  img.style.width = (16 + Math.random()*14) + "px";
  particles.appendChild(img);

  const dx = (Math.random()*90)-45;
  const dy = (Math.random()*70)-35;

  img.animate([
    {transform:"translate(0,0) scale(.7)", opacity:0},
    {transform:`translate(${dx}px,${dy}px) scale(1.2)`, opacity:1},
    {transform:`translate(${dx*1.5}px,${dy*1.5}px) scale(.4)`, opacity:0}
  ], {
    duration:700 + Math.random()*700,
    iterations:Infinity
  });
}

function spawnMeteor(){
  const img = document.createElement("img");
  img.src = "meteor.png";
  img.className = "particle";
  img.style.left = Math.random()*50 + "%";
  img.style.top = "-10px";
  img.style.width = "34px";
  particles.appendChild(img);

  img.animate([
    {transform:"translate(0,0) rotate(0deg)", opacity:0},
    {transform:"translate(90px,120px) rotate(25deg)", opacity:1},
    {transform:"translate(170px,240px) rotate(45deg)", opacity:0}
  ], {
    duration:1100 + Math.random()*700,
    iterations:Infinity
  });
}

function makeParticles(rarity){
  clearParticles();
  if(rarity === "Electric"){
    for(let i=0;i<10;i++) spawnElectric();
  }
  if(rarity === "Magma"){
    for(let i=0;i<6;i++) spawnMeteor();
  }
}

function previewWeapon(){
  const name = makerName.value || "Preview";
  const damage = makerDamage.value || "";
  const rarity = makerRarity.value;
  const power = makerPower.value || "";

  makerPreviewIcon.src = previewIconURL || currentIconValue;
  makerPreviewName.textContent = name;
  makerPreviewDamage.textContent = damage;
  makerPreviewRarity.textContent = rarity;
  makerPreviewPower.textContent = power;

  const color = rarityColors[rarity.toLowerCase()] || "#fff";
  makerPreviewName.style.color = color;
  makerPreviewName.style.textShadow = `0 0 10px ${color}`;
  makerPreviewRarity.style.color = color;
  makerPreviewRarity.style.textShadow = `0 0 10px ${color}`;

  makeParticles(rarity);
}

function generateCode(){
  codeOutput.value =
`<div class="item" onclick="showItem('${makerName.value}', ${makerDamage.value}, '${makerRarity.value}', ${makerPower.value})">
    <img src="${currentIconValue}">
</div>`;
}

function copyCode(){
  if(codeOutput.value) navigator.clipboard.writeText(codeOutput.value);
}

function resetMaker(){
  makerName.value = "";
  makerDamage.value = "";
  makerPower.value = "";
  makerRarity.selectedIndex = 0;
  currentIconValue = "";
  previewIconURL = "";
  selectedIconDisplay.textContent = "No icon selected";
  makerPreviewIcon.src = "";
  makerPreviewName.textContent = "Preview";
  makerPreviewDamage.textContent = "";
  makerPreviewRarity.textContent = "";
  makerPreviewPower.textContent = "";
  codeOutput.value = "";
  clearParticles();
}

loadWeapons();
</script>

</body>
</html>
