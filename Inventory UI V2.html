<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory UI V2</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

background:  conic-gradient(#3c0e62, #4a082a, #3c0e62);
    color: white;
    font-family: Arial;
}

/* panel */
.panel {
   
    width: 1352px;
    height: 490px;
    background: #1a1a24;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    gap: 20px;
}

/* items */
.items {
  display: grid !important;
  grid-template-columns: repeat(4, 70px) !important;
  gap: 12px;

  align-content: start !important; /* 🔥 KEY FIX */
}

.item {
  width: 70px;
  height: 70px;

  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;

  display: flex;
  align-items: center;
  justify-content: center;
}
    
#particleContainer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  opacity: 0.8;
  animation: floatUp 1.2s ease-out forwards;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-80px) scale(0.5);
    opacity: 0;
  }
}

.item.selected {
    border: 2px solid;
}

.item img {
    width: 80%;
    height: 80%;
}

/* info panel */
.info-panel {
    flex: 1;
    background: #14141c;
    border-radius: 15px;
    padding: 15px;
    height: 450px;
   width: 100px;

    position: relative; /* ← THIS IS THE FIX */
}

.info-panel p {
    display: flex;
    align-items: center;
    gap: 8px;
}


#itemIcon {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 60px;
  
}
.stat-icon {
    width: 60px;
    height: 60px;
}

/* labels */
.label {
    color: #aaa;
}

/* name */
#name {
    font-size: 22px;
    font-weight: bold;
    padding-right: 90px !important;
}

/* enchant box */
.enchant-box {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.enchant-box select {
    background: #2b071f;
    color: rgb(255, 0, 93);
    text-shadow: #a3148d 0 0 10px;
    border: none;
    padding: 6px;
    border-radius: 6px;
}

.enchant-box button {
   background: linear-gradient(135deg, #190a11, #29001e);
    color: rgb(166, 0, 255);
    text-shadow: #4d0e48 0 0 10px;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* enchant display */
#enchantDisplay {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

#enchantIcon {
    width: 60px;
    height: 60px;
}
#enchantDescBox {
    display: flex;
    align-items: center;
    gap: 8px;
}
#enchantDesc {
    opacity: 0.8;
    text-align: center;
}

#enchantTitle {
    font-weight: bold;

}

#enchantdescbox-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    z-index: -1;
}
.enchant-box {
    margin-top: 15px;
    display: flex;
    justify-content: center; /* 👈 centers it */
    gap: 10px;
}

.portal-panel{
    margin-top:24px;
    padding:18px;
    border-radius:18px;
    background:rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.08);
}

.portal-panel h3{
    margin:0 0 14px;
    color:#fff;
    text-shadow:0 0 10px #ff00ea;
}

.portal-grid{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.portal-card{
    min-width:97px;
    padding:14px;
    border-radius:14px;
    background:#252536;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:.2s;
}

.h3{
    margin:0 0 14px;
    color:#fff;
    text-shadow:0 0 10px #ff00ea;
    font-size:20px;
    position: relative;
}

.portal-card:hover{
    transform:translateY(-2px);
    box-shadow:0 0 14px #00eaff;
}

.portal-card img{
    width:34px;
    height:34px;
    object-fit:contain;
}

.portal-icon{
    font-size:28px;
}

.portal-card span:last-child{
    font-weight:bold;
}

.enchant-flash{
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    pointer-events:none;
    opacity:0;
    z-index:20;
}

.enchant-flash.active{
    animation:mcdFlash .45s ease-out;
}

@keyframes mcdFlash{
    0%{
        left:-120%;
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        left:120%;
        opacity:0;
    }
}
.ap-panel,
.mp-panel{

    position:absolute;

    left:16px;

    width:185px;
    height:38px;

    padding:8px 10px;

    border-radius:12px;

    z-index:30;

    display:flex;
    align-items:center;

    background:rgba(43,23,56,.92);

    overflow:hidden;
    box-sizing:border-box;
}

/* AP */
.ap-panel{

    top:14px;

    box-shadow:
        0 0 10px #ff00ff,
        0 0 18px #8400ff;
}

/* MP */
.mp-panel{

    top:62px;

    box-shadow:
        0 0 10px #00bbff,
        0 0 18px #0066ff;
}

/* ICONS */
.ap-icon,
.mp-icon{

    width:18px;
    height:18px;

    margin-right:8px;

    flex-shrink:0;
}

/* LABELS */
.amethyst-points-h3{

    font-size:13px;
    font-weight:bold;

    margin:0;

    white-space:nowrap;

    color:#ff5cf8;

    text-shadow:0 0 6px currentColor;
}
#apBalance,
#mpBalance{

    font-size:13px;
    font-weight:bold;

    margin-left:6px;
}
/* AP BALANCE */
#apBalance{

    font-size:16px;
    font-weight:bold;

    background:linear-gradient(
        45deg,
        #ff00ff,
        #7a00ff
    );

    background-clip:text;
    -webkit-background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;
}

/* MP BALANCE */
#mpBalance{

    font-size:16px;
    font-weight:bold;

    background:linear-gradient(
        45deg,
        #00b7ff,
        #004cff
    );

    background-clip:text;
    -webkit-background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;
}

.ap-popup{
    position:absolute;

    right:-10px;
    top:50%;

    transform:translateY(-50%);

    color:#ff00ff;

    font-weight:bold;

    opacity:0;

    pointer-events:none;

    text-shadow:
        0 0 10px #ff00ff;

    transition:
        opacity .25s,
        transform .4s;
}

.ap-popup.show{
    opacity:1;

    transform:
        translateY(-50%)
        translateX(20px);
}

.gain-ap-btn{
    position: relative;
    background: linear-gradient(135deg, #190a11, #29001e);
    color: rgb(166, 0, 255);
    text-shadow: #4d0e48 0 0 10px;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
}
.gain-ap-panel{
    position:relative;
    background:linear-gradient(135deg, #000000, #680266); 
    top:20px;
    left:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding: 10px 18px;
    border-radius: 6px;
    box-shadow:0 0 20px #ff00ff;
    height: 200px;
}

.mp-popup{
    position:absolute;

    right:-10px;
    top:84%;

    transform:translateY(-50%);

    color:#1900ff;

    font-weight:bold;

    opacity:0;

    pointer-events:none;

    text-shadow:
        0 0 10px #00fffb;

    transition:
        opacity .25s,
        transform .4s;
}

.mp-popup.show{
    opacity:1;

    transform:
        translateY(-50%)
        translateX(20px);
}

.minigames-btn{
    position: relative;
    background: linear-gradient(135deg, #000000, #004cff);
    color: rgb(255, 0, 255);
    text-shadow: #ff00ff 0 0 10px;
    text-align: center;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;}
</style>
</head>
